<section class="section">
  <h2>Experience</h2>

  {% for e in site.data.experience %}
    <div class="card">
      <h3>{{ e.role }}</h3>
      <p><strong>{{ e.company }}</strong> · {{ e.period }}</p>

      {% if e.achievements %}
        <ul>
          {% for a in e.achievements %}
            <li>{{ a }}</li>
          {% endfor %}
        </ul>
      {% endif %}

      {% if e.stack %}
        <p><strong>Stack:</strong> {{ e.stack | join: ", " }}</p>
      {% endif %}
    </div>
  {% endfor %}
</section>
