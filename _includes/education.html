<section class="section">
  <h2>Education & Programs</h2>

  {% for ed in site.data.education %}
    <div class="card">
      <h3>{{ ed.name }}</h3>
      <p><strong>{{ ed.institution }}</strong> · {{ ed.period }}</p>
      {% if ed.notes %}
        <p>{{ ed.notes }}</p>
      {% endif %}
    </div>
  {% endfor %}
</section>
